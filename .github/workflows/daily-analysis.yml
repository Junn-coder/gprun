name: Daily Stock Analysis

on:
  schedule:
    # 北京时间每天早上 8:00 执行（UTC 时间 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Clone lifchang tools (scan_cn.py)
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository_owner }}/lifchang.git /tmp/lifchang

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scan_cn.py → get 3 candidates
        id: scan
        run: |
          export PYTHONPATH="/tmp/lifchang/c/ctool:$PYTHONPATH"
          cd /tmp/lifchang/c/ctool
          CODES=$(python scan_cn.py --final 3 2>&1 | awk '/^[ ]+[1-3]/{print $2}' | tr '\n' ';' | sed 's/;$//')
          echo "SCAN_CODES=$CODES" >> $GITHUB_OUTPUT
          echo "Scanned codes: $CODES"

      - name: Run stock analysis with scanned codes
        run: |
          python gpfenxi.py --codes "${{ steps.scan.outputs.SCAN_CODES }}"
        env:
          _API_KEY: ${{ secrets._API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}